<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>medvault-webapp</title>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="padding: 20px; color: red; font-family: monospace; background: white; z-index: 9999; position: absolute; top:0; left:0; width:100%; height:100%;">' +
        '<h1>Global Error Detected</h1>' +
        '<p><strong>Message:</strong> ' + message + '</p>' +
        '<p><strong>Source:</strong> ' + source + ':' + lineno + '</p>' +
        '<pre style="background: #f0f0f0; padding: 10px; overflow: auto;">' + (error ? error.stack : 'No stack trace') + '</pre>' +
        '</div>';
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
